<button class="clicker">click</button>
<style>
  .clicker{
    color: white;
    background-color: green;
    cursor: pointer;
    transition: box-shadow 0.2s;
    border: none;
    padding-top: 12px;
    padding-bottom: 12px;
    padding-left: 22px;
    padding-right: 22px;
     
  }

  .clicker:hover {
    box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.7) ;
  }
  .clicker:active {
    box-shadow: 0px 3px 10px rgba(0, 0, 0, 0) ;
    margin-left: 10px;
    margin-top: 7px;
  }

</style>
