<style>
  .s-button {
    background-color: rgb(200, 0, 0);
    color: whitesmoke;
    border: none;
    padding-top: 12px;
    padding-bottom: 12px;
    padding-left: 22px;
    padding-right: 22px;
    vertical-align: top;
    border-radius: 3px;
    cursor: pointer;
    margin-right: 10px;
    font-weight: bold;
    transition: opacity 0.2s;
  }

  .s-button:hover {
    opacity: 0.8;  
  }
  .s-button:active {
    opacity: 0.4;
  }

  
  .t-button {
    background-color: rgb(57, 123, 255);
    color: white;
    border: none;
    padding-top: 12px;
    padding-bottom: 12px;
    padding-left: 15px;
    padding-right: 15px;
    vertical-align: top;
    border-radius: 3px;
    border-radius: 20px;
    font-weight: bold;
    cursor: pointer;
    margin-left: 10px;
    transition: box-shadow 0.2s;
  }

  .t-button:hover {
    box-shadow: 0px 3px 10px rgba(0, 0, 0, 0.7) ;
  }

  .t-button:active {
    box-shadow: 0px 3px 10px rgba(0, 0, 0, 1);
  }

    .j-button {
    background-color: white;
    color:rgb(49, 120, 251) ;
    border-color: rgb(49, 120, 251);
    border-style: solid;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 13px;
    padding-right: 13px;
    vertical-align: top;
    border-radius: 3px;
    border-radius: 3px;
    border-width: 2px;
    cursor: pointer;
    font-weight: bold;
    transition: background-color 1s, 
      color 1s;
  }

    .j-button:hover {
      background-color: rgb(49, 120, 251);
      color: white;
    }
    .j-button:active {
      opacity: 0.6;
    }
</style>

<button class = "s-button">SUBSCRIBE</button>
<button class = "j-button">JOIN</button>
<button class = "t-button">TWEET</button>
