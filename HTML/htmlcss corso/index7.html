<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FORM</title>
</head>
<body>
  <form action="index.php" method="POST">
    <label for="username">NOME:</label>
    <input type="text" id="username" required minlength="6" placeholder="Scrivi il tuo username">
    <br>
    <label for="password">PASSW:</label>
    <input type="password" id="password" required placeholder="Inserisci la tua password" minlength="8" maxlength="15">
    <br>
    <label for="email">EMAIL:</label>
    <input type="email" id="email" placeholder="porco.dio@gmail.com">
    <br>
    <label for="cellulare">CELLU:</label>
    <input type="tel" id="cellulare" placeholder="000-000-0000" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}">
    <br>
    <label for="compleanno">NASCITA</label>
    <input type="date" id="compleanno" required>
    <br>
    <label for="quantita">NUMERO</label>
    <input type="number" id="quantita" min="0" max="20" value="1">
    <br>
    <label for="titolo">COSA SEI:</label>
    
    <input type="radio" id="maschio" name="titolo">
    <label for="maschio">M</label>
    
    <input type="radio" id="femmina" name="titolo">
    <label for="F">F</label>
    
    <input type="radio" id="TRANS" name="titolo">
    <label for="TRANS">TRANS</label>
    <br>
    <hr>
    <input type="reset">
    <input type="submit">
  </form>
  
</body>
</html>
